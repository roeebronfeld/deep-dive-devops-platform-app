<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Platform Frontend</title>
    <style>
      body {
        font-family: sans-serif;
        line-height: 1.5;
        margin: 0;
        padding: 2rem;
      }

      main {
        margin: 0 auto;
        max-width: 720px;
      }

      section {
        border: 1px solid #d0d7de;
        margin-top: 1rem;
        padding: 1rem;
      }

      h1,
      h2,
      p,
      ul {
        margin-top: 0;
      }

      code,
      pre {
        background: #f6f8fa;
        padding: 0.25rem;
      }

      .error {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DevOps Platform Frontend</h1>
      <p>This page fetches data from the local backend.</p>

      <section>
        <h2>Health</h2>
        <p id="health-status">Loading...</p>
      </section>

      <section>
        <h2>Deployment</h2>
        <pre id="deployment-summary">Loading...</pre>
      </section>

      <section>
        <h2>Pods</h2>
        <ul id="pods-list">
          <li>Loading...</li>
        </ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
