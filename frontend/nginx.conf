server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    location /pods {
        proxy_pass http://backend:8000/pods;
    }
}
