services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devops_platform
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
